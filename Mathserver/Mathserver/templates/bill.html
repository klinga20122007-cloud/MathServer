<!DOCTYPE html>
<html>

<head>

    <title>GST Calculator</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right, #dbeafe, #1e3a8a);
        }

        .box{
            width: 350px;
            background: white;
            padding: 30px;
            margin: auto;
            margin-top: 100px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            color: #1e3a8a;
        }

        input{
            width: 90%;
            padding: 10px;
            margin-top: 15px;
            border: 1px solid lightgray;
            border-radius: 5px;
        }

        button{
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
        }

        h2{
            color: darkgreen;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>GST Bill Calculator</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="number" name="price" placeholder="Enter Price" required>

            <input type="number" name="gst" placeholder="Enter GST %" required>

            <button type="submit">Calculate</button>

        </form>

        {% if total_bill %}

        <h2>Total Bill = ₹ {{ total_bill }}</h2>

        {% endif %}

    </div>

</body>

</html>
